<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGEND ARENA - أسطوري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ===== reset & base ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body {
            min-height:100vh;
            background:#0a0e1a;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:16px;
            overflow-x:hidden;
            position:relative;
            transition:background 0.5s ease;
        }
        body.light-mode {
            background:#f0f2f5;
        }

        /* ===== خلفية نجوم ===== */
        .stars {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:0;
            pointer-events:none;
            overflow:hidden;
        }
        .star {
            position:absolute;
            width:2px;
            height:2px;
            background:#fff;
            border-radius:50%;
            animation:twinkle var(--duration) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity:0.2; transform:scale(0.8); }
            100% { opacity:1; transform:scale(1.2); }
        }

        /* ===== container ===== */
        .container {
            position:relative;
            z-index:1;
            max-width:1100px;
            width:100%;
            margin:auto;
            background:rgba(255,255,255,0.03);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            padding:20px;
            border-radius:24px;
            border:1px solid rgba(255,255,255,0.04);
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
            transition:all 0.5s ease;
        }
        body.light-mode .container {
            background:rgba(255,255,255,0.8);
            border-color:rgba(0,0,0,0.05);
            box-shadow:0 20px 60px rgba(0,0,0,0.08);
        }

        /* ===== header ===== */
        .header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:10px 0 20px;
            border-bottom:1px solid rgba(255,255,255,0.03);
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:10px;
        }
        .header .logo { display:flex; align-items:center; gap:10px; }
        .header .logo .icon { font-size:32px; animation:rotate 10s linear infinite; }
        @keyframes rotate { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
        .header .logo h1 { color:#fff; font-size:24px; font-weight:900; letter-spacing:1px; }
        .header .logo h1 span {
            background:linear-gradient(135deg,#f7c948,#f5a623);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        body.light-mode .header .logo h1 { color:#1a1a2e; }

        .header-controls {
            display:flex;
            align-items:center;
            gap:12px;
        }
        .theme-toggle {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.04);
            color:rgba(255,255,255,0.3);
            padding:6px 14px;
            border-radius:20px;
            cursor:pointer;
            font-size:14px;
            transition:all 0.3s ease;
        }
        .theme-toggle:hover { background:rgba(247,201,72,0.05); border-color:rgba(247,201,72,0.1); }
        body.light-mode .theme-toggle { color:rgba(0,0,0,0.4); border-color:rgba(0,0,0,0.05); }

        .live-badge {
            background:#e74c3c;
            color:#fff;
            padding:4px 14px;
            border-radius:20px;
            font-size:11px;
            font-weight:700;
            letter-spacing:1px;
            animation:pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* ===== tabs ===== */
        .tabs {
            display:flex;
            gap:4px;
            background:rgba(255,255,255,0.03);
            border-radius:14px;
            padding:4px;
            margin-bottom:20px;
            border:1px solid rgba(255,255,255,0.03);
            flex-wrap:wrap;
        }
        .tab-btn {
            flex:1;
            padding:10px 16px;
            border:none;
            background:transparent;
            border-radius:12px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s ease;
            color:rgba(255,255,255,0.2);
            text-align:center;
            min-width:80px;
        }
        .tab-btn:hover { color:rgba(255,255,255,0.4); }
        .tab-btn.active {
            background:rgba(247,201,72,0.08);
            color:#f7c948;
            box-shadow:0 0 30px rgba(247,201,72,0.03);
        }
        body.light-mode .tab-btn { color:rgba(0,0,0,0.2); }
        body.light-mode .tab-btn.active { background:rgba(247,201,72,0.15); color:#b8860b; }

        .tab-content { display:none; animation:fadeUp 0.4s ease; }
        .tab-content.active { display:block; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        /* ===== match cards ===== */
        .matches-list { display:flex; flex-direction:column; gap:12px; }
        .match-card {
            display:flex;
            align-items:center;
            justify-content:space-between;
            background:rgba(255,255,255,0.03);
            border-radius:16px;
            padding:16px 20px;
            border:1px solid rgba(255,255,255,0.04);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            cursor:pointer;
            flex-wrap:wrap;
            gap:8px;
            position:relative;
            overflow:hidden;
        }
        .match-card::before {
            content:'';
            position:absolute;
            top:0;
            left:-100%;
            width:100%;
            height:100%;
            background:linear-gradient(90deg,transparent,rgba(247,201,72,0.03),transparent);
            transition:left 0.6s ease;
        }
        .match-card:hover::before { left:100%; }
        .match-card:hover {
            background:rgba(255,255,255,0.05);
            border-color:rgba(247,201,72,0.06);
            transform:translateY(-3px) scale(1.01);
            box-shadow:0 10px 40px rgba(0,0,0,0.3);
        }
        body.light-mode .match-card { background:rgba(255,255,255,0.5); border-color:rgba(0,0,0,0.04); }
        body.light-mode .match-card:hover { background:rgba(255,255,255,0.7); }

        .match-card .match-time {
            color:rgba(255,255,255,0.15);
            font-size:12px;
            font-weight:700;
            min-width:60px;
            letter-spacing:1px;
        }
        .match-card .match-teams {
            display:flex;
            align-items:center;
            gap:12px;
            flex:1;
            justify-content:center;
            flex-wrap:wrap;
        }
        .match-card .match-teams .team {
            display:flex;
            align-items:center;
            gap:8px;
            font-weight:700;
            color:#fff;
            font-size:15px;
        }
        body.light-mode .match-card .match-teams .team { color:#1a1a2e; }
        .match-card .match-teams .team .flag { font-size:22px; }
        .match-card .match-teams .vs {
            color:rgba(255,255,255,0.05);
            font-weight:900;
            font-size:12px;
            letter-spacing:2px;
        }
        .match-card .match-status {
            color:rgba(78,205,196,0.3);
            font-size:10px;
            font-weight:700;
            letter-spacing:1px;
            background:rgba(78,205,196,0.04);
            padding:4px 12px;
            border-radius:12px;
            border:1px solid rgba(78,205,196,0.04);
        }
        .match-card .match-result {
            color:#f7c948;
            font-weight:900;
            font-size:18px;
            padding:0 10px;
        }

        /* ===== pitch modal ===== */
        .pitch-modal-overlay {
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            backdrop-filter:blur(25px);
            z-index:1000;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .pitch-modal-overlay.active { display:flex; }
        .pitch-modal-box {
            background:linear-gradient(145deg,rgba(15,20,40,0.98),rgba(10,14,26,0.99));
            border-radius:24px;
            padding:25px;
            max-width:750px;
            width:100%;
            border:1px solid rgba(255,255,255,0.04);
            box-shadow:0 50px 100px rgba(0,0,0,0.8);
            animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
            max-height:90vh;
            overflow-y:auto;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.9) translateY(30px);} to{opacity:1;transform:scale(1) translateY(0);} }

        .pitch-modal-box .modal-header {
            text-align:center;
            padding-bottom:15px;
            border-bottom:1px solid rgba(255,255,255,0.04);
            margin-bottom:15px;
        }
        .pitch-modal-box .modal-header h2 { color:#fff; font-size:20px; font-weight:700; }
        .pitch-modal-box .modal-header .sub-info { color:rgba(255,255,255,0.1); font-size:13px; letter-spacing:1px; }

        /* pitch layout */
        .pitch-container {
            display:flex;
            gap:15px;
            align-items:stretch;
            flex-wrap:wrap;
        }
        .pitch {
            flex:2;
            min-width:250px;
            background:linear-gradient(180deg,#1a7a3a,#2d8f4e);
            border-radius:16px;
            padding:15px;
            border:2px solid rgba(255,255,255,0.04);
            position:relative;
            min-height:400px;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            box-shadow:inset 0 0 60px rgba(0,0,0,0.3);
        }
        .pitch .pitch-players {
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            height:100%;
            position:relative;
            z-index:2;
            padding:30px 0;
        }
        .pitch .pitch-players .row {
            display:flex;
            justify-content:space-around;
            gap:10px;
            flex-wrap:wrap;
        }
        .pitch .pitch-players .player-dot {
            width:32px;
            height:32px;
            border-radius:50%;
            background:rgba(255,255,255,0.06);
            border:2px solid rgba(255,255,255,0.06);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:9px;
            color:rgba(255,255,255,0.2);
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position:relative;
        }
        .pitch .pitch-players .player-dot:hover {
            transform:scale(1.4);
            background:rgba(247,201,72,0.15);
            border-color:#f7c948;
            color:#fff;
            box-shadow:0 0 30px rgba(247,201,72,0.1);
            z-index:10;
        }
        .pitch .pitch-players .player-dot.team-a { border-color:rgba(52,152,219,0.3); background:rgba(52,152,219,0.05); }
        .pitch .pitch-players .player-dot.team-b { border-color:rgba(231,76,60,0.3); background:rgba(231,76,60,0.05); }

        /* squad sidebar */
        .squad-sidebar {
            flex:1;
            min-width:150px;
            background:rgba(255,255,255,0.02);
            border-radius:16px;
            padding:15px;
            border:1px solid rgba(255,255,255,0.03);
            display:flex;
            flex-direction:column;
            gap:6px;
            max-height:450px;
            overflow-y:auto;
        }
        .squad-sidebar::-webkit-scrollbar { width:3px; }
        .squad-sidebar::-webkit-scrollbar-track { background:transparent; }
        .squad-sidebar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.05); border-radius:10px; }

        .squad-sidebar .squad-title {
            color:rgba(255,255,255,0.05);
            font-size:10px;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;
            text-align:center;
            padding-bottom:8px;
            border-bottom:1px solid rgba(255,255,255,0.02);
        }
        .squad-sidebar .squad-player {
            display:flex;
            align-items:center;
            gap:8px;
            padding:6px 10px;
            background:rgba(255,255,255,0.01);
            border-radius:10px;
            border:1px solid rgba(255,255,255,0.01);
            transition:all 0.3s ease;
            cursor:pointer;
        }
        .squad-sidebar .squad-player:hover {
            background:rgba(247,201,72,0.03);
            border-color:rgba(247,201,72,0.06);
            transform:translateX(-4px);
        }
        .squad-sidebar .squad-player .name {
            color:rgba(255,255,255,0.4);
            font-size:12px;
            font-weight:600;
            flex:1;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .squad-sidebar .squad-team-divider {
            color:#f7c948;
            font-size:11px;
            font-weight:700;
            text-align:center;
            padding:8px 0;
            border-bottom:1px solid rgba(247,201,72,0.04);
            margin-top:4px;
        }

        /* ===== vote ===== */
        .vote-section {
            margin-top:20px;
            padding:15px;
            background:rgba(255,255,255,0.02);
            border-radius:16px;
            border:1px solid rgba(255,255,255,0.03);
        }
        .vote-section .vote-title {
            color:rgba(255,255,255,0.05);
            font-size:11px;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;
            text-align:center;
            margin-bottom:12px;
        }
        .vote-section .vote-options {
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .vote-section .vote-options .vote-btn {
            padding:8px 24px;
            border-radius:50px;
            border:1px solid rgba(255,255,255,0.04);
            background:rgba(255,255,255,0.02);
            color:rgba(255,255,255,0.2);
            font-size:13px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            display:flex;
            align-items:center;
            gap:8px;
            position:relative;
            overflow:hidden;
        }
        .vote-section .vote-options .vote-btn:hover {
            transform:scale(1.05);
            border-color:rgba(247,201,72,0.1);
            background:rgba(247,201,72,0.04);
            color:#fff;
        }
        .vote-section .vote-options .vote-btn:active { transform:scale(0.95); }
        .vote-section .vote-options .vote-btn.voted {
            border-color:#f7c948;
            background:rgba(247,201,72,0.08);
            color:#f7c948;
            box-shadow:0 0 40px rgba(247,201,72,0.03);
        }
        .vote-section .vote-options .vote-btn .vote-count {
            background:rgba(255,255,255,0.03);
            padding:0 10px;
            border-radius:12px;
            font-size:11px;
            color:rgba(255,255,255,0.1);
        }
        .vote-section .vote-progress {
            margin-top:12px;
            display:flex;
            gap:8px;
            align-items:center;
        }
        .vote-section .vote-progress .bar {
            flex:1;
            height:3px;
            background:rgba(255,255,255,0.03);
            border-radius:10px;
            overflow:hidden;
            display:flex;
        }
        .vote-section .vote-progress .bar .fill {
            height:100%;
            transition:width 1s cubic-bezier(0.34,1.56,0.64,1);
            border-radius:10px;
        }
        .vote-section .vote-progress .bar .fill.a { background:#3498db; }
        .vote-section .vote-progress .bar .fill.b { background:#e74c3c; }
        .vote-section .vote-status {
            text-align:center;
            margin-top:10px;
            font-size:12px;
            color:rgba(255,255,255,0.05);
            transition:all 0.3s ease;
        }
        .vote-section .vote-status.success { color:rgba(78,205,196,0.4); }

        /* ===== table ===== */
        .table-wrapper {
            overflow-x:auto;
            border-radius:16px;
            background:rgba(255,255,255,0.01);
            border:1px solid rgba(255,255,255,0.02);
        }
        table { width:100%; border-collapse:collapse; }
        th {
            background:rgba(247,201,72,0.02);
            color:rgba(247,201,72,0.1);
            padding:12px 10px;
            font-size:12px;
            font-weight:700;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.02);
            letter-spacing:1px;
            white-space:nowrap;
        }
        td {
            padding:10px 8px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.01);
            color:rgba(255,255,255,0.2);
            font-size:13px;
            cursor:pointer;
            transition:all 0.3s ease;
            white-space:nowrap;
        }
        tr:hover td {
            background:rgba(255,255,255,0.02);
            color:rgba(255,255,255,0.4);
        }
        .team-name { font-weight:700; color:#fff; font-size:14px; }
        body.light-mode .team-name { color:#1a1a2e; }

        .close-btn {
            display:block;
            margin:20px auto 0;
            padding:10px 35px;
            background:rgba(255,255,255,0.03);
            color:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.03);
            border-radius:50px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s ease;
        }
        .close-btn:hover {
            background:rgba(255,255,255,0.05);
            color:rgba(255,255,255,0.2);
            transform:scale(1.02);
        }

        .hint {
            text-align:center;
            color:rgba(255,255,255,0.02);
            font-size:11px;
            margin-top:16px;
            letter-spacing:1px;
        }
        body.light-mode .hint { color:rgba(0,0,0,0.05); }

        .admin-link { display:none !important; }
        #adminPage { display:none !important; }

        /* ===== responsive ===== */
        @media (max-width:768px) {
            .container { padding:14px; border-radius:18px; }
            .header .logo h1 { font-size:18px; }
            .header .live-badge { font-size:9px; padding:3px 10px; }
            .tab-btn { font-size:12px; padding:8px 12px; min-width:60px; }
            .match-card { padding:12px 16px; flex-direction:column; align-items:stretch; text-align:center; }
            .match-card .match-teams { justify-content:center; }
            .match-card .match-time { text-align:center; }
            .pitch-container { flex-direction:column; }
            .pitch { min-height:300px; }
            .squad-sidebar { max-height:200px; }
            .vote-section .vote-options .vote-btn { padding:6px 16px; font-size:12px; }
        }
        @media (max-width:480px) {
            .header .logo h1 { font-size:15px; }
            .header .logo .icon { font-size:24px; }
            .match-card .match-teams .team { font-size:12px; }
            .match-card .match-teams .team .flag { font-size:16px; }
        }
    </style>
</head>
<body>

<!-- ===== نجوم ===== -->
<div class="stars" id="stars"></div>

<!-- ===== الحاوية ===== -->
<div class="container">

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">
            <span class="icon">⚽</span>
            <h1><span>LEGEND</span> ARENA</h1>
        </div>
        <div class="header-controls">
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <span class="live-badge">🔴 LIVE</span>
        </div>
    </header>

    <!-- ===== TABS ===== -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="matches">🏟️ المباريات</button>
        <button class="tab-btn" data-tab="standings">📊 الترتيب</button>
        <button class="tab-btn" data-tab="topscorers">⭐ الهدافون</button>
    </div>

    <!-- ===== TAB: MATCHES ===== -->
    <div class="tab-content active" id="matches">
        <div class="matches-list" id="matchesList"></div>
        <div class="hint">👆 اضغط على أي مباراة لمشاهدة التشكيلة</div>
    </div>

    <!-- ===== TAB: STANDINGS ===== -->
    <div class="tab-content" id="standings">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>#</th><th>الفريق</th><th>لعب</th><th>فوز</th><th>تعادل</th><th>خسارة</th><th>الأهداف</th><th>النقاط</th></tr></thead>
                <tbody id="standingsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== TAB: TOP SCORERS ===== -->
    <div class="tab-content" id="topscorers">
        <div class="table-wrapper">
            <table>
                <thead><tr><th>#</th><th>اللاعب</th><th>الفريق</th><th>الأهداف</th></tr></thead>
                <tbody id="topScorersBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- ===== PITCH MODAL ===== -->
<div class="pitch-modal-overlay" id="pitchModal">
    <div class="pitch-modal-box">
        <div class="modal-header">
            <h2 id="modalMatchTitle">🏟️ المباراة</h2>
            <div class="sub-info" id="modalMatchInfo">📅 1/7/26 ⏰ 10:00</div>
        </div>
        <div class="pitch-container">
            <div class="pitch" id="pitchField"></div>
            <div class="squad-sidebar" id="squadSidebar"></div>
        </div>
        <div class="vote-section">
            <div class="vote-title">🗳️ التصويت</div>
            <div class="vote-options" id="voteOptions"></div>
            <div class="vote-progress" id="voteProgress"></div>
            <div class="vote-status" id="voteStatus">اختر فريقك للتصويت</div>
        </div>
        <button class="close-btn" onclick="closePitch()">✕ إغلاق</button>
    </div>
</div>

<script>
    // =============================================
    // DATA
    // =============================================

    // =============================================

    // =============================================
    let currentMatchId = null;
    let voteData = {};

    function openPitch(matchId) {
        currentMatchId = matchId;
        const match = matches.find(m => m.id === matchId);
        if (!match) return;

        const teamA = teams.find(t => t.id === match.teamA);
        const teamB = teams.find(t => t.id === match.teamB);

        document.getElementById('modalMatchTitle').textContent = `🏟️ ${teamA.name} ⚔️ ${teamB.name}`;
        document.getElementById('modalMatchInfo').textContent = `📅 ${match.date} ⏰ ${match.time}`;

        // Pitch
        const pitch = document.getElementById('pitchField');
        const playersA = players.filter(p => p.team === match.teamA);
        const playersB = players.filter(p => p.team === match.teamB);
        const allPitchPlayers = [...playersA, ...playersB];

        let pitchHTML = `<div class="pitch-players">`;
        // Split into rows (simplified)
        const rows = [];
        const total = allPitchPlayers.length;
        const perRow = Math.ceil(total / 4);
        for (let i = 0; i < total; i += perRow) {
            rows.push(allPitchPlayers.slice(i, i + perRow));
        }
        rows.forEach(row => {
            pitchHTML += `<div class="row">`;
            row.forEach(p => {
                const team = teams.find(t => t.id === p.team);
                const isA = p.team === match.teamA;
                pitchHTML += `<div class="player-dot ${isA ? 'team-a' : 'team-b'}" title="${p.name} (${team ? team.short : ''})">${p.name.charAt(0)}</div>`;
            });
            pitchHTML += `</div>`;
        });
        pitchHTML += `</div>`;
        pitch.innerHTML = pitchHTML;

        // Squad sidebar
        const sidebar = document.getElementById('squadSidebar');
        let sidebarHTML = `<div class="squad-title">📋 التشكيلة</div>`;
        // Team A
        sidebarHTML += `<div class="squad-team-divider">${teamA.flag} ${teamA.name}</div>`;
        playersA.forEach(p => {
            sidebarHTML += `<div class="squad-player"><span class="name">${p.name}</span><span class="number">⚽${p.goals}</span></div>`;
        });
        // Team B
        sidebarHTML += `<div class="squad-team-divider">${teamB.flag} ${teamB.name}</div>`;
        playersB.forEach(p => {
            sidebarHTML += `<div class="squad-player"><span class="name">${p.name}</span><span class="number">⚽${p.goals}</span></div>`;
        });
        sidebar.innerHTML = sidebarHTML;

        // Vote
        renderVote(matchId);

        document.getElementById('pitchModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closePitch() {
        document.getElementById('pitchModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // =============================================
    // VOTE SYSTEM (localStorage)
    // =============================================
    function getVotes(matchId) {
        const key = `legendVotes_${matchId}`;
        const data = localStorage.getItem(key);
        if (data) return JSON.parse(data);
        return { a: 0, b: 0 };
    }

    function saveVotes(matchId, votes) {
        localStorage.setItem(`legendVotes_${matchId}`, JSON.stringify(votes));
    }

    function getUserVote(matchId) {
        return localStorage.getItem(`legendUserVote_${matchId}`);
    }

    function setUserVote(matchId, team) {
        localStorage.setItem(`legendUserVote_${matchId}`, team);
    }

    function renderVote(matchId) {
        const match = matches.find(m => m.id === matchId);
        if (!match) return;
        const teamA = teams.find(t => t.id === match.teamA);
        const teamB = teams.find(t => t.id === match.teamB);
        const votes = getVotes(matchId);
        const total = votes.a + votes.b || 1;
        const userVote = getUserVote(matchId);

        const container = document.getElementById('voteOptions');
        container.innerHTML = `
            <button class="vote-btn ${userVote === 'a' ? 'voted' : ''}" onclick="castVote(${matchId}, 'a')">
                ${teamA.flag} ${teamA.name} <span class="vote-count">${votes.a}</span>
            </button>
            <button class="vote-btn ${userVote === 'b' ? 'voted' : ''}" onclick="castVote(${matchId}, 'b')">
                ${teamB.flag} ${teamB.name} <span class="vote-count">${votes.b}</span>
            </button>
        `;

        const progress = document.getElementById('voteProgress');
        progress.innerHTML = `
            <div class="bar"><div class="fill a" style="width:${(votes.a/total)*100}%;"></div></div>
            <div class="bar"><div class="fill b" style="width:${(votes.b/total)*100}%;"></div></div>
        `;

        const status = document.getElementById('voteStatus');
        if (userVote) {
            const votedTeam = userVote === 'a' ? teamA.name : teamB.name;
            status.textContent = `✅ صوتت لـ ${votedTeam} | إجمالي الأصوات: ${total}`;
            status.className = 'vote-status success';
        } else {
            status.textContent = `🗳️ اختر فريقك للتصويت (إجمالي الأصوات: ${total})`;
            status.className = 'vote-status';
        }
    }

    function castVote(matchId, team) {
        const userVote = getUserVote(matchId);
        if (userVote) {
            document.getElementById('voteStatus').textContent = '⚠️ لقد قمت بالتصويت مسبقاً!';
            document.getElementById('voteStatus').className = 'vote-status';
            return;
        }
        const votes = getVotes(matchId);
        if (team === 'a') votes.a++;
        else votes.b++;
        saveVotes(matchId, votes);
        setUserVote(matchId, team);
        renderVote(matchId);
    }
