<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGEND ARENA - يلا شوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== خلفية داكنة ===== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(180deg, #0a0e1a 0%, #0f1a2e 40%, #0a0e1a 100%);
        }

        .bg-animation .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            animation: floatGlow 12s ease-in-out infinite;
        }

        .bg-animation .glow:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #f7c948, transparent);
            opacity: 0.04;
            top: -20%;
            right: -10%;
            animation-delay: 0s;
        }

        .bg-animation .glow:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ff6b6b, transparent);
            opacity: 0.03;
            bottom: -20%;
            left: -10%;
            animation-delay: -4s;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* ===== الحاوية الرئيسية ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            width: 100%;
            margin: auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* ===== الهيدر ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 20px;
        }

        .header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .logo .icon {
            font-size: 32px;
        }

        .header .logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .header .logo h1 span {
            background: linear-gradient(135deg, #f7c948, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .live-badge {
            background: #e74c3c;
            color: #fff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== التبويبات ===== */
        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        .tab-btn.active {
            background: rgba(247, 201, 72, 0.08);
            color: #f7c948;
            box-shadow: 0 0 30px rgba(247, 201, 72, 0.03);
        }

        .tab-content {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== بطاقات المباريات (يلا شوت ستايل) ===== */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .match-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(247, 201, 72, 0.06);
            transform: translateY(-2px);
        }

        .match-card .match-time {
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            font-weight: 700;
            min-width: 60px;
            letter-spacing: 1px;
        }

        .match-card .match-teams {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }

        .match-card .match-teams .team {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #fff;
            font-size: 15px;
        }

        .match-card .match-teams .team .flag {
            font-size: 22px;
        }

        .match-card .match-teams .vs {
            color: rgba(255, 255, 255, 0.05);
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .match-card .match-status {
            color: rgba(78, 205, 196, 0.3);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            background: rgba(78, 205, 196, 0.04);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(78, 205, 196, 0.04);
        }

        /* ===== ملعب كرة القدم ===== */
        .pitch-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .pitch-modal-overlay.active {
            display: flex;
        }

        .pitch-modal-box {
            background: linear-gradient(145deg, rgba(15, 20, 40, 0.98), rgba(10, 14, 26, 0.99));
            border-radius: 24px;
            padding: 25px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .pitch-modal-box .modal-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 15px;
        }

        .pitch-modal-box .modal-header h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        .pitch-modal-box .modal-header .sub-info {
            color: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== الملعب ===== */
        .pitch-container {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .pitch {
            flex: 1;
            background: linear-gradient(180deg, #1a7a3a, #2d8f4e);
            border-radius: 16px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pitch .pitch-line {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .pitch .pitch-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .pitch .pitch-center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        .pitch .pitch-half {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.04);
        }

        .pitch .pitch-goal-top {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: none;
        }

        .pitch .pitch-goal-bottom {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: none;
        }

        .pitch .pitch-penalty-top {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: none;
        }

        .pitch .pitch-penalty-bottom {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: none;
        }

        .pitch .pitch-players {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
            z-index: 2;
            padding: 30px 0;
        }

        .pitch .pitch-players .row {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .pitch .pitch-players .player-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pitch .pitch-players .player-dot:hover {
            background: rgba(247, 201, 72, 0.06);
            border-color: rgba(247, 201, 72, 0.08);
        }

        /* ===== قائمة اللاعبين الجانبية ===== */
        .squad-sidebar {
            width: 180px;
            min-width: 150px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .squad-sidebar .squad-title {
            color: rgba(255, 255, 255, 0.05);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .squad-sidebar .squad-player {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.01);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .squad-sidebar .squad-player:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(247, 201, 72, 0.04);
        }

        .squad-sidebar .squad-player .flag {
            font-size: 16px;
        }

        .squad-sidebar .squad-player .name {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .squad-sidebar .squad-player .number {
            color: rgba(255, 255, 255, 0.05);
            font-size: 10px;
            font-weight: 700;
        }

        .squad-sidebar .squad-team-divider {
            color: #f7c948;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(247, 201, 72, 0.04);
            margin-top: 6px;
        }

        /* ===== التصويت ===== */
        .vote-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .vote-section .vote-title {
            color: rgba(255, 255, 255, 0.05);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
        }

        .vote-section .vote-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .vote-section .vote-options .vote-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vote-section .vote-options .vote-btn:hover {
            border-color: rgba(247, 201, 72, 0.08);
            background: rgba(247, 201, 72, 0.03);
            color: #fff;
        }

        .vote-section .vote-options .vote-btn.voted {
            border-color: #f7c948;
            background: rgba(247, 201, 72, 0.05);
            color: #f7c948;
        }

        .vote-section .vote-options .vote-btn .vote-count {
            background: rgba(255, 255, 255, 0.02);
            padding: 0 8px;
            border-radius: 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
        }

        .vote-section .vote-status {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.05);
        }

        .vote-section .vote-status.success {
            color: rgba(78, 205, 196, 0.3);
        }

        /* ===== الجداول ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
        }

        th {
            background: rgba(247, 201, 72, 0.02);
            color: rgba(247, 201, 72, 0.1);
            padding: 12px 10px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            letter-spacing: 1px;
        }

        td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.4);
        }

        .team-name {
            font-weight: 700;
            color: #fff;
            font-size: 14px;
        }

        .matches-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.03);
            font-size: 16px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.01);
        }

        .close-btn {
            display: block;
            margin: 20px auto 0;
            padding: 10px 35px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.2);
        }

        .admin-link { display: none !important; }
        #adminPage { display: none !important; }

        .hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.02);
            font-size: 11px;
            margin-top: 16px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .container { padding: 14px; border-radius: 18px; }
            .header .logo h1 { font-size: 18px; }
            .header .live-badge { font-size: 9px; padding: 3px 10px; }
            .tab-btn { font-size: 12px; padding: 8px 12px; }
            .match-card { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
            .match-card .match-teams .team { font-size: 13px; }
            .match-card .match-teams .team .flag { font-size: 18px; }
            .match-card .match-time { font-size: 10px; min-width: 50px; }
            .pitch-container { flex-direction: column; }
            .squad-sidebar { width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap; gap: 4px; }
            .squad-sidebar .squad-title { width: 100%; }
            .squad-sidebar .squad-player { flex: 1; min-width: 60px; }
            .pitch { min-height: 300px; padding: 10px; }
            .pitch .pitch-players .player-dot { width: 22px; height: 22px; font-size: 8px; }
            .vote-section .vote-options .vote-btn { font-size: 11px; padding: 6px 14px; }
            .pitch-modal-box { padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="glow"></div>
        <div class="glow"></div>
    </div>

    <div id="mainPage" class="container">
        <div class="header">
            <div class="logo">
                <span class="icon">⚽</span>
                <h1><span>LEGEND</span> ARENA</h1>
            </div>
            <div class="live-badge">🔴 LIVE</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="matches">🏅 المباريات</button>
            <button class="tab-btn" data-tab="vote">🗳️ التصويت</button>
            <button class="tab-btn" data-tab="goals">⚽ الهدافين</button>
        </div>

        <div id="matches" class="tab-content active">
            <div class="matches-list" id="matchesList"></div>
        </div>

        <div id="vote" class="tab-content">
            <div class="matches-list" id="voteList"></div>
        </div>

        <div id="goals" class="tab-content">
            <table>
                <thead>
                    <tr><th>#</th><th>اللاعب</th><th>الفريق</th><th>الأهداف</th></tr>
                </thead>
                <tbody id="goalsBody"></tbody>
            </table>
            <div class="hint">👆 اضغط على أي لاعب لعرض إحصائياته</div>
        </div>
    </div>

    <!-- ===== نافذة الملعب ===== -->
    <div class="pitch-modal-overlay" id="pitchModal">
        <div class="pitch-modal-box">
            <div class="modal-header">
                <h2 id="pitchTitle">🏟️ المباراة</h2>
                <div class="sub-info" id="pitchSub">📅 اختر أفضل لاعب</div>
            </div>

            <div class="pitch-container">
                <div class="pitch" id="pitchField">
                    <div class="pitch-line pitch-half"></div>
                    <div class="pitch-center"></div>
                    <div class="pitch-center-dot"></div>
                    <div class="pitch-goal-top"></div>
                    <div class="pitch-goal-bottom"></div>
                    <div class="pitch-penalty-top"></div>
                    <div class="pitch-penalty-bottom"></div>
                    <div class="pitch-players" id="pitchPlayers">
                        <!-- سيتم تعبئتها بواسطة JavaScript -->
                    </div>
                </div>

                <div class="squad-sidebar" id="squadSidebar">
                    <div class="squad-title">📋 التشكيلة</div>
                    <div id="squadList"></div>
                </div>
            </div>

            <!-- ===== التصويت ===== -->
            <div class="vote-section" id="pitchVoteSection">
                <div class="vote-title">🗳️ أفضل لاعب في المباراة</div>
                <div class="vote-options" id="pitchVoteOptions"></div>
                <div class="vote-status" id="pitchVoteStatus">👆 اختر أفضل لاعب</div>
            </div>

            <button class="close-btn" onclick="closePitchModal()">✕ إغلاق</button>
        </div>
    </div>

    <!-- ===== نافذة اللاعب ===== -->
    <div class="player-modal-overlay" id="playerModal">
        <div class="player-modal-box">
            <div class="player-avatar" id="playerAvatar">
                <span class="placeholder">👤</span>
                <div class="player-flag" id="playerFlag">🇸🇾</div>
            </div>
            <div class="player-name" id="playerNameDisplay">اسم اللاعب</div>
            <div class="player-team" id="playerTeamDisplay">الفريق</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-icon">⚽</span>
                    <span class="stat-number" id="playerGoals">0</span>
                    <span class="stat-label">الأهداف</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-number" id="playerAssists">0</span>
                    <span class="stat-label">الأسيست</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <span class="stat-number" id="playerMatches">0</span>
                    <span class="stat-label">المباريات</span>
                </div>
            </div>
            <button class="close-btn-player" onclick="closePlayerModal()">✕ إغلاق</button>
        </div>
    </div>

    <script>

        // ===== دوال التصويت =====
        let cachedVotes = {};

        async function getVotesFromCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await response.json();
                cachedVotes = data.record.votes || {};
                return cachedVotes;
            } catch (error) {
                return cachedVotes;
            }
        }

        async function saveVotesToCloud(votes) {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ votes })
                });
                cachedVotes = votes;
            } catch (error) {}
        }

        async function getPlayerVotes(playerName) {
            const votes = await getVotesFromCloud();
            if (!votes[playerName]) {
                votes[playerName] = 0;
                await saveVotesToCloud(votes);
            }
            return votes[playerName];
        }

        async function addVote(playerName) {
            const userVoteKey = `voted_player_${playerName}`;
            if (localStorage.getItem(userVoteKey)) return false;

            const votes = await getVotesFromCloud();
            if (!votes[playerName]) votes[playerName] = 0;
            votes[playerName]++;
            await saveVotesToCloud(votes);
            localStorage.setItem(userVoteKey, 'true');
            return true;
        }

        function hasUserVotedForPlayer(playerName) {
            return localStorage.getItem(`voted_player_${playerName}`) !== null;
        }

        async function hasUserVotedInMatch(players) {
            for (let p of players) {
                if (hasUserVotedForPlayer(p.name)) return true;
            }
            return false;
        }

        function loadData() {
            const saved = localStorage.getItem('leagueData');
            if (saved) {
                try { return JSON.parse(saved); } catch(e) { return DEFAULT_DATA; }
            } else {
                saveData(DEFAULT_DATA);
                return DEFAULT_DATA;
            }
        }

        function saveData(data) {
            localStorage.setItem('leagueData', JSON.stringify(data));
        }

        function getData() {
            return loadData();
        }

        // ===== عرض المباريات =====

            const container = document.getElementById('matchesList');
            container.innerHTML = BRACKET_MATCHES.map((m) => `

            `).join('');
        }

        // ===== فتح نافذة الملعب =====
        async function openPitchModal(team1, team2, date, time) {
            const data = getData();
            const players1 = data.players.filter(p => p.team === team1);
            const players2 = data.players.filter(p => p.team === team2);
            const allPlayers = [...players1, ...players2];

            document.getElementById('pitchTitle').textContent = `🏟️ ${team1} ⚔️ ${team2}`;
            document.getElementById('pitchSub').textContent = `📅 ${date} | ⏰ ${time}`;

            // ===== تشكيلة الملعب =====
            const pitchPlayers = document.getElementById('pitchPlayers');
            let pitchHTML = '';

            // صفوف الملعب (حراس، دفاع، وسط، هجوم)
            const positions = [
                { label: 'GK', players: players1.slice(0, 1) },
                { label: 'DEF', players: players1.slice(1, 4) },
                { label: 'MID', players: players1.slice(4, 6) },
                { label: 'FWD', players: players1.slice(6) }
            ];

            pitchHTML += positions.map(pos => `
                <div class="row">
                    ${pos.players.map(p => `
                        <div class="player-dot" onclick="event.stopPropagation(); showPlayerStats('${p.name}')" title="${p.name}">
                            ${p.name.charAt(0)}
                        </div>
                    `).join('')}
                    ${pos.players.length === 0 ? '<div class="player-dot" style="opacity:0.1;">-</div>'.repeat(3) : ''}
                </div>
            `).join('');

            // الفريق الثاني (في الأسفل)
            const positions2 = [
                { label: 'FWD', players: players2.slice(0, 2) },
                { label: 'MID', players: players2.slice(2, 5) },
                { label: 'DEF', players: players2.slice(5, 8) },
                { label: 'GK', players: players2.slice(8, 9) }
            ];

            pitchHTML += positions2.map(pos => `
                <div class="row">
                    ${pos.players.map(p => `
                        <div class="player-dot" onclick="event.stopPropagation(); showPlayerStats('${p.name}')" title="${p.name}">
                            ${p.name.charAt(0)}
                        </div>
                    `).join('')}
                    ${pos.players.length === 0 ? '<div class="player-dot" style="opacity:0.1;">-</div>'.repeat(3) : ''}
                </div>
            `).join('');

            pitchPlayers.innerHTML = pitchHTML;

            // ===== القائمة الجانبية =====
            const squadList = document.getElementById('squadList');
            let squadHTML = '';

            squadHTML += `<div class="squad-team-divider">🔵 ${team1}</div>`;
            if (players1.length > 0) {
                squadHTML += players1.map(p => `
                    <div class="squad-player" onclick="event.stopPropagation(); showPlayerStats('${p.name}')">
                        <span class="flag">${SYRIAN_FLAG}</span>
                        <span class="name">${p.name}</span>
                    </div>
                `).join('');
            } else {
                squadHTML += `<div style="color:rgba(255,255,255,0.03);padding:6px;text-align:center;font-size:11px;">🚫 لا لاعبين</div>`;
            }

            squadHTML += `<div class="squad-team-divider">🔴 ${team2}</div>`;
            if (players2.length > 0) {
                squadHTML += players2.map(p => `
                    <div class="squad-player" onclick="event.stopPropagation(); showPlayerStats('${p.name}')">
                        <span class="flag">${SYRIAN_FLAG}</span>
                        <span class="name">${p.name}</span>
                    </div>
                `).join('');
            } else {
                squadHTML += `<div style="color:rgba(255,255,255,0.03);padding:6px;text-align:center;font-size:11px;">🚫 لا لاعبين</div>`;
            }

            squadList.innerHTML = squadHTML;

            // ===== التصويت =====
            const voteOptions = document.getElementById('pitchVoteOptions');
            const voteStatus = document.getElementById('pitchVoteStatus');

            const userVotedInMatch = await hasUserVotedInMatch(allPlayers);

            if (userVotedInMatch) {
                voteStatus.textContent = '✅ لقد قمت بالتصويت مسبقاً!';
                voteStatus.className = 'vote-status success';
            } else {
                voteStatus.textContent = '🗳️ اختر أفضل لاعب في المباراة';
                voteStatus.className = 'vote-status';
            }

            let voteHTML = '';
            for (let p of allPlayers) {
                const votes = await getPlayerVotes(p.name);
                const hasVoted = hasUserVotedForPlayer(p.name);
                const isDisabled = userVotedInMatch && !hasVoted;

                voteHTML += `
                    <button class="vote-btn ${hasVoted ? 'voted' : ''}" 
                        onclick="voteForPlayer('${p.name}', '${team1}', '${team2}', '${date}')" 
                        ${hasVoted || isDisabled ? 'disabled' : ''}>
                        ${p.name}
                        <span class="vote-count">${votes}</span>
                    </button>
                `;
            }
            voteOptions.innerHTML = voteHTML;

            document.getElementById('pitchModal').classList.add('active');
        }

        // ===== التصويت =====
        async function voteForPlayer(playerName, team1, team2, date) {
            if (hasUserVotedForPlayer(playerName)) {
                alert('⚠️ لقد قمت بالتصويت لهذا اللاعب مسبقاً!');
                return;
            }

            const data = getData();
            const allPlayers = data.players.filter(p => p.team === team1 || p.team === team2);
            if (await hasUserVotedInMatch(allPlayers)) {
                alert('⚠️ لا يمكنك التصويت لأكثر من لاعب في المباراة الواحدة!');
                return;
            }

            const success = await addVote(playerName);
            if (success) {
                alert(`✅ تم التصويت للاعب ${playerName} بنجاح!`);
                openPitchModal(team1, team2, date, '');
            }
        }

        function closePitchModal() {
            document.getElementById('pitchModal').classList.remove('active');
        }

        // ===== الهدافين =====
        function renderGoals(data) {
            const tbody = document.getElementById('goalsBody');
            const sorted = [...data.players].sort((a, b) => b.goals - a.goals);
            tbody.innerHTML = sorted.map((p, i) => `
                <tr onclick="showPlayerStats('${p.name}')">
                    <td>${i + 1}</td>
                    <td class="team-name">${p.name}</td>
                    <td>${p.team}</td>
                    <td>${p.goals}</td>
                </tr>
            `).join('');
        }

        // ===== نافذة اللاعب =====
        function showPlayerStats(playerName) {
            const data = getData();
            const player = data.players.find(p => p.name === playerName);
            if (!player) return;

            document.getElementById('playerNameDisplay').textContent = player.name;
            document.getElementById('playerTeamDisplay').textContent = `🏟️ ${player.team}`;
            document.getElementById('playerGoals').textContent = player.goals || 0;
            document.getElementById('playerAssists').textContent = player.assists || 0;
            document.getElementById('playerMatches').textContent = player.matches || 0;
            document.getElementById('playerFlag').textContent = SYRIAN_FLAG;

            document.getElementById('playerModal').classList.add('active');
        }

        function closePlayerModal() {
            document.getElementById('playerModal').classList.remove('active');
        }

        // ===== إغلاق النوافذ =====
        document.getElementById('pitchModal').addEventListener('click', function(e) {
            if (e.target === this) closePitchModal();
        });

        document.getElementById('playerModal').addEventListener('click', function(e) {
            if (e.target === this) closePlayerModal();
        });

        // ===== التبويبات =====
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            localStorage.setItem('leagueData', JSON.stringify(DEFAULT_DATA));
            renderMatches();
            renderVoteList();
            renderGoals(getData());
            setupTabs();
        });
