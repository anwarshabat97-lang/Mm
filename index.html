<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGEND ARENA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
            font-size: 38px;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            font-weight: 900;
        }

        h1 span {
            color: #f7c948;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: rgba(255, 255, 255, 0.10);
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
        }

        .tab-btn.active {
            background: #f7c948;
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(247, 201, 72, 0.3);
            border-color: #f7c948;
        }

        .tab-content {
            display: none;
            animation: fade 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(247, 201, 72, 0.20);
            color: #f7c948;
            padding: 16px 12px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid rgba(247, 201, 72, 0.15);
        }

        td {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            color: #e0e0e0;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        td:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        tr {
            cursor: pointer;
            transition: 0.3s;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .team-name {
            font-weight: bold;
            color: #fff;
        }

        .points-highlight {
            font-weight: bold;
            color: #f7c948;
            font-size: 18px;
        }

        .matches-message {
            text-align: center;
            color: #888;
            font-size: 18px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
        }

        /* ===== نوافذ منبثقة ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #1a1a2e;
            border-radius: 25px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(247, 201, 72, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h2 {
            color: #f7c948;
            text-align: center;
            margin-bottom: 20px;
            font-size: 26px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 15px;
        }

        .modal-box .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 16px;
            transition: 0.3s;
            cursor: pointer;
        }

        .modal-box .player-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .modal-box .player-item .flag {
            font-size: 28px;
        }

        .modal-box .close-btn {
            display: block;
            margin: 20px auto 0;
            padding: 10px 35px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-box .close-btn:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        .modal-box .no-players {
            text-align: center;
            color: #888;
            padding: 30px 0;
            font-size: 18px;
        }

        /* ===== نافذة اللاعب الفردية ===== */
        .player-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-modal-overlay.active {
            display: flex;
        }

        .player-modal-box {
            background: linear-gradient(145deg, #1a1a2e, #24243e);
            border-radius: 30px;
            padding: 35px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(247, 201, 72, 0.15);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            animation: modalIn 0.3s ease;
            text-align: center;
        }

        .player-modal-box .player-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(247, 201, 72, 0.2);
            position: relative;
            overflow: hidden;
        }

        .player-modal-box .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .player-modal-box .player-avatar .placeholder {
            font-size: 50px;
            color: #555;
            opacity: 0.5;
        }

        .player-modal-box .player-flag {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .player-modal-box .player-name {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-modal-box .player-team {
            color: #888;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .player-modal-box .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .player-modal-box .stat-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 15px 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .player-modal-box .stat-item .stat-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .player-modal-box .stat-item .stat-number {
            color: #f7c948;
            font-size: 22px;
            font-weight: bold;
            display: block;
        }

        .player-modal-box .stat-item .stat-label {
            color: #888;
            font-size: 12px;
            display: block;
            margin-top: 3px;
        }

        .player-modal-box .close-btn-player {
            display: block;
            margin: 15px auto 0;
            padding: 10px 35px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .player-modal-box .close-btn-player:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        .admin-link {
            display: none !important;
        }

        #adminPage {
            display: none !important;
        }

        .modal-box::-webkit-scrollbar {
            width: 4px;
        }
        .modal-box::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .modal-box::-webkit-scrollbar-thumb {
            background: rgba(247, 201, 72, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="mainPage" class="container">
        <h1>🏆 <span>LEGEND</span> ARENA</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="teams">ترتيب الفرق</button>
            <button class="tab-btn" data-tab="goals">الهدافين</button>
            <button class="tab-btn" data-tab="matches">المباريات</button>
        </div>

        <div id="teams" class="tab-content active">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الفريق</th>
                        <th>مباريات</th>
                        <th>فوز</th>
                        <th>خسارة</th>
                        <th>نقاط</th>
                    </tr>
                </thead>
                <tbody id="teamsBody"></tbody>
            </table>
            <p style="text-align:center;color:#888;font-size:14px;margin-top:15px;">👆 اضغط على أي فريق لعرض لاعبيه</p>
        </div>

        <div id="goals" class="tab-content">
            <table>
                <thead>
                    <tr><th>#</th><th>اللاعب</th><th>الفريق</th><th>الأهداف</th></tr>
                </thead>
                <tbody id="goalsBody"></tbody>
            </table>
            <p style="text-align:center;color:#888;font-size:14px;margin-top:15px;">👆 اضغط على أي لاعب لعرض إحصائياته</p>
        </div>

        <div id="matches" class="tab-content">
            <div class="matches-message">
                ⏳ لم يتم تحديد توقيت المباريات
            </div>
        </div>

    </div>

    <!-- ===== نافذة الفريق ===== -->
    <div class="modal-overlay" id="playersModal">
        <div class="modal-box">
            <h2 id="modalTeamName">🏆 الفريق</h2>
            <div id="modalPlayersList"></div>
            <button class="close-btn" onclick="closeModal()">✕ إغلاق</button>
        </div>
    </div>

    <!-- ===== نافذة اللاعب الفردية ===== -->
    <div class="player-modal-overlay" id="playerModal">
        <div class="player-modal-box">
            <div class="player-avatar" id="playerAvatar">
                <span class="placeholder">👤</span>
                <div class="player-flag" id="playerFlag">🇸🇾</div>
            </div>
            <div class="player-name" id="playerNameDisplay">اسم اللاعب</div>
            <div class="player-team" id="playerTeamDisplay">الفريق</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-icon">⚽</span>
                    <span class="stat-number" id="playerGoals">0</span>
                    <span class="stat-label">الأهداف</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-number" id="playerAssists">0</span>
                    <span class="stat-label">الأسيست</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <span class="stat-number" id="playerMatches">0</span>
                    <span class="stat-label">المباريات</span>
                </div>
            </div>
            <button class="close-btn-player" onclick="closePlayerModal()">✕ إغلاق</button>
        </div>
    </div>

    <script>
        const SYRIAN_FLAG = "🇸🇾";

        const DEFAULT_DATA = {
            teams: [
                { name: "FC ALNUKHAB", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "بني خالد 911", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "العرب", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "Al NASER", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "CUKUR FFC", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "team fc", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "Star club", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "Al Nukhba", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "Alpha squad", played: 0, wins: 0, losses: 0, points: 0 }
            ],
            players: [
                // FC ALNUKHAB
                { name: "مراد العفنان", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "يوسف الجسري", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "طارق", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "ياسين", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "عبد الرحمن تلاوي", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "ميار", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                // بني خالد 911
                { name: "جاسم", team: "بني خالد 911", goals: 0, assists: 0, matches: 0 },
                { name: "مازن", team: "بني خالد 911", goals: 0, assists: 0, matches: 0 },
                // العرب
                { name: "ميسم الشباط", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "سمهر السباعي", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "عبد الرحمن تركماني", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "أدهم مشارقه", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "وجدي النجار", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "عبد الحفيظ زكور", team: "العرب", goals: 0, assists: 0, matches: 0 },
                // Al NASER
                { name: "مهند قواس", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "جميل", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "عمر", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "فراس", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "همام", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                // CUKUR FFC
                { name: "شعار", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                { name: "فهد", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                { name: "مالك", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                // team fc
                { name: "عزت", team: "team fc", goals: 0, assists: 0, matches: 0 }
                // Star club - بدون لاعبين
                // Al Nukhba - بدون لاعبين
                // Alpha squad - بدون لاعبين
            ]
        };

        function loadData() {
            const saved = localStorage.getItem('leagueData');
            if (saved) {
                return JSON.parse(saved);
            } else {
                saveData(DEFAULT_DATA);
                return DEFAULT_DATA;
            }
        }

        function saveData(data) {
            localStorage.setItem('leagueData', JSON.stringify(data));
        }

        function getData() {
            return loadData();
        }

        function renderAll() {
            const data = getData();
            renderTeams(data);
            renderGoals(data);
        }

        function renderTeams(data) {
            const tbody = document.getElementById('teamsBody');
            const sorted = [...data.teams].sort((a, b) => b.points - a.points);
            tbody.innerHTML = sorted.map((team, i) => `
                <tr onclick="showTeamPlayers('${team.name}')">
                    <td>${i + 1}</td>
                    <td class="team-name">${team.name}</td>
                    <td>${team.played}</td>
                    <td>${team.wins}</td>
                    <td>${team.losses}</td>
                    <td><span class="points-highlight">${team.points}</span></td>
                </tr>
            `).join('');
        }

        function renderGoals(data) {
            const tbody = document.getElementById('goalsBody');
            const sorted = [...data.players].sort((a, b) => b.goals - a.goals);
            tbody.innerHTML = sorted.map((p, i) => `
                <tr onclick="showPlayerStats('${p.name}')">
                    <td>${i + 1}</td>
                    <td class="team-name">${p.name}</td>
                    <td>${p.team}</td>
                    <td>${p.goals}</td>
                </tr>
            `).join('');
        }

        // ===== نافذة الفريق =====
        function showTeamPlayers(teamName) {
            const data = getData();
            const teamPlayers = data.players.filter(p => p.team === teamName);
            const modal = document.getElementById('playersModal');
            const modalTitle = document.getElementById('modalTeamName');
            const modalList = document.getElementById('modalPlayersList');

            modalTitle.textContent = `🏆 ${teamName}`;

            if (teamPlayers.length === 0) {
                modalList.innerHTML = `<div class="no-players">🚫 لا يوجد لاعبون في هذا الفريق</div>`;
            } else {
                modalList.innerHTML = teamPlayers.map(p => `
                    <div class="player-item" onclick="event.stopPropagation(); showPlayerStats('${p.name}')">
                        <span class="flag">${SYRIAN_FLAG}</span>
                        <span>${p.name}</span>
                        <span style="color:#888;font-size:13px;margin-right:auto;">سوريا</span>
                    </div>
                `).join('');
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('playersModal').classList.remove('active');
        }

        // ===== نافذة اللاعب الفردية =====
        function showPlayerStats(playerName) {
            const data = getData();
            const player = data.players.find(p => p.name === playerName);
            if (!player) return;

            document.getElementById('playerNameDisplay').textContent = player.name;
            document.getElementById('playerTeamDisplay').textContent = `🏟️ ${player.team}`;
            document.getElementById('playerGoals').textContent = player.goals || 0;
            document.getElementById('playerAssists').textContent = player.assists || 0;
            document.getElementById('playerMatches').textContent = player.matches || 0;
            document.getElementById('playerFlag').textContent = SYRIAN_FLAG;

            const avatar = document.getElementById('playerAvatar');
            const img = avatar.querySelector('img');
            const placeholder = avatar.querySelector('.placeholder');
            if (img) {
                img.style.display = 'none';
                img.src = '';
            }
            if (placeholder) {
                placeholder.style.display = 'block';
            }

            document.getElementById('playerModal').classList.add('active');
        }

        function closePlayerModal() {
            document.getElementById('playerModal').classList.remove('active');
        }

        // إغلاق النوافذ عند الضغط خارجها
        document.getElementById('playersModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('playerModal').addEventListener('click', function(e) {
            if (e.target === this) closePlayerModal();
        });

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!localStorage.getItem('leagueData')) {
                saveData(DEFAULT_DATA);
            }
            renderAll();
            setupTabs();
        });
    </script>

</body>
</html>
