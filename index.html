<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGEND ARENA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Tahoma', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 30%, #2a1a3e 60%, #0a0a1a 100%);
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
        }

        .bg-animation .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #f7c94820, #f7c94805);
            top: -10%;
            right: -5%;
            animation-delay: 0s;
        }

        .bg-animation .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff6b6b15, #ff6b6b05);
            bottom: -20%;
            left: -10%;
            animation-delay: -3s;
        }

        .bg-animation .orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4ecdc420, #4ecdc405);
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: -5s;
        }

        .bg-animation .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f7c948;
            border-radius: 50%;
            box-shadow: 0 0 15px #f7c948, 0 0 30px #f7c94840;
            animation: sparkle 4s ease-in-out infinite;
        }

        .bg-animation .sparkle:nth-child(4) { top: 15%; left: 10%; animation-delay: 0s; }
        .bg-animation .sparkle:nth-child(5) { top: 25%; right: 15%; animation-delay: -1s; }
        .bg-animation .sparkle:nth-child(6) { bottom: 30%; left: 20%; animation-delay: -2s; }
        .bg-animation .sparkle:nth-child(7) { bottom: 20%; right: 10%; animation-delay: -3s; }
        .bg-animation .sparkle:nth-child(8) { top: 50%; left: 5%; animation-delay: -0.5s; }
        .bg-animation .sparkle:nth-child(9) { top: 60%; right: 5%; animation-delay: -2.5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            margin: auto;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 35px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
            font-size: 42px;
            letter-spacing: 4px;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(247, 201, 72, 0.2), 0 0 80px rgba(247, 201, 72, 0.05);
        }

        h1 span {
            background: linear-gradient(135deg, #f7c948, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        h1 .subtitle {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 8px;
            font-weight: 400;
            margin-top: 5px;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.15);
        }

        .tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f7c948, #f5a623);
            color: #0a0a1a;
            box-shadow: 0 8px 30px rgba(247, 201, 72, 0.25);
            border-color: transparent;
            transform: translateY(-2px);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        th {
            background: rgba(247, 201, 72, 0.08);
            color: #f7c948;
            padding: 18px 14px;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid rgba(247, 201, 72, 0.08);
            letter-spacing: 1px;
        }

        td {
            padding: 16px 14px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.75);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .team-name {
            font-weight: 700;
            color: #fff;
            font-size: 16px;
        }

        .points-highlight {
            font-weight: 900;
            color: #f7c948;
            font-size: 20px;
            text-shadow: 0 0 30px rgba(247, 201, 72, 0.15);
        }

        .matches-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 18px;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.04);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: linear-gradient(145deg, rgba(20, 15, 40, 0.95), rgba(10, 10, 30, 0.98));
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(247, 201, 72, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.4s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-box h2 {
            color: #f7c948;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 15px;
            font-weight: 700;
        }

        .modal-box .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .modal-box .player-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(247, 201, 72, 0.1);
            transform: translateX(-5px);
        }

        .modal-box .player-item .flag {
            font-size: 28px;
        }

        .modal-box .close-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 40px;
            background: rgba(231, 76, 60, 0.8);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .modal-box .close-btn:hover {
            background: #e74c3c;
            transform: scale(1.02);
        }

        .modal-box .no-players {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            padding: 30px 0;
            font-size: 18px;
        }

        .player-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-modal-overlay.active {
            display: flex;
        }

        .player-modal-box {
            background: linear-gradient(145deg, rgba(25, 20, 50, 0.98), rgba(10, 10, 30, 0.99));
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(247, 201, 72, 0.06);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            animation: modalIn 0.4s ease;
            text-align: center;
        }

        .player-modal-box .player-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(247, 201, 72, 0.05), rgba(247, 201, 72, 0.01));
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(247, 201, 72, 0.1);
            position: relative;
            overflow: hidden;
        }

        .player-modal-box .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .player-modal-box .player-avatar .placeholder {
            font-size: 55px;
            color: rgba(255, 255, 255, 0.05);
        }

        .player-modal-box .player-flag {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid #0a0a1a;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .player-modal-box .player-name {
            color: #fff;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .player-modal-box .player-team {
            color: rgba(255, 255, 255, 0.2);
            font-size: 15px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .player-modal-box .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .player-modal-box .stat-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .player-modal-box .stat-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(247, 201, 72, 0.05);
        }

        .player-modal-box .stat-item .stat-icon {
            font-size: 26px;
            display: block;
            margin-bottom: 5px;
        }

        .player-modal-box .stat-item .stat-number {
            color: #f7c948;
            font-size: 24px;
            font-weight: 900;
            display: block;
            text-shadow: 0 0 30px rgba(247, 201, 72, 0.1);
        }

        .player-modal-box .stat-item .stat-label {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            display: block;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .player-modal-box .close-btn-player {
            display: block;
            margin: 15px auto 0;
            padding: 12px 40px;
            background: rgba(231, 76, 60, 0.8);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .player-modal-box .close-btn-player:hover {
            background: #e74c3c;
            transform: scale(1.02);
        }

        .admin-link { display: none !important; }
        #adminPage { display: none !important; }

        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .modal-box::-webkit-scrollbar-thumb { background: rgba(247, 201, 72, 0.15); border-radius: 10px; }

        .hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.08);
            font-size: 13px;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; border-radius: 25px; }
            h1 { font-size: 28px; }
            h1 .subtitle { font-size: 11px; letter-spacing: 4px; }
            .tab-btn { padding: 10px 18px; font-size: 13px; }
            th, td { padding: 12px 8px; font-size: 13px; }
            .player-modal-box { padding: 25px 18px; }
            .player-modal-box .player-avatar { width: 100px; height: 100px; }
            .player-modal-box .player-name { font-size: 20px; }
            .player-modal-box .stats-grid { gap: 8px; }
            .player-modal-box .stat-item { padding: 12px 8px; }
            .modal-box { padding: 25px 18px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
    </div>

    <div id="mainPage" class="container">
        <h1>
            🏆 <span>LEGEND</span> ARENA
            <span class="subtitle">— البطولة الذهبية —</span>
        </h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="teams">🏅 ترتيب الفرق</button>
            <button class="tab-btn" data-tab="goals">⚽ الهدافين</button>
            <button class="tab-btn" data-tab="matches">📅 المباريات</button>
        </div>

        <div id="teams" class="tab-content active">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الفريق</th>
                        <th>مباريات</th>
                        <th>فوز</th>

                        <th>نقاط</th>

                </thead>
                <tbody id="teamsBody"></tbody>
            </table>
            <div class="hint">👆 اضغط على أي فريق لعرض لاعبيه</div>
        </div>

        <div id="goals" class="tab-content">
            <table>
                <thead>
                    <tr><th>#</th><th>اللاعب</th><th>الفريق</th><th>الأهداف</th></tr>
                </thead>
                <tbody id="goalsBody"></tbody>
            </table>
            <div class="hint">👆 اضغط على أي لاعب لعرض إحصائياته</div>
        </div>

        <div id="matches" class="tab-content">
            <div class="matches-message">
                ⏳ لم يتم تحديد توقيت المباريات
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="playersModal">
        <div class="modal-box">
            <h2 id="modalTeamName">🏆 الفريق</h2>
            <div id="modalPlayersList"></div>
            <button class="close-btn" onclick="closeModal()">✕ إغلاق</button>
        </div>
    </div>

    <div class="player-modal-overlay" id="playerModal">
        <div class="player-modal-box">
            <div class="player-avatar" id="playerAvatar">
                <span class="placeholder">👤</span>
                <div class="player-flag" id="playerFlag">🇸🇾</div>
            </div>
            <div class="player-name" id="playerNameDisplay">اسم اللاعب</div>
            <div class="player-team" id="playerTeamDisplay">الفريق</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-icon">⚽</span>
                    <span class="stat-number" id="playerGoals">0</span>
                    <span class="stat-label">الأهداف</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎯</span>
                    <span class="stat-number" id="playerAssists">0</span>
                    <span class="stat-label">الأسيست</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <span class="stat-number" id="playerMatches">0</span>
                    <span class="stat-label">المباريات</span>
                </div>
            </div>
            <button class="close-btn-player" onclick="closePlayerModal()">✕ إغلاق</button>
        </div>
    </div>

    <script>
        const SYRIAN_FLAG = "🇸🇾";

        const DEFAULT_DATA = {
            teams: [
                { name: "FC ALNUKHAB", played: 0, wins: 0, losses: 0, points: 0 },

                { name: "Al Nukhba", played: 0, wins: 0, losses: 0, points: 0 },
                { name: "Alpha squad", played: 0, wins: 0, losses: 0, points: 0 }
            ],
            players: [

                { name: "مراد العفنان", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "يوسف الجسري", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "طارق", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },

                { name: "عبد الرحمن تلاوي", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                { name: "ميار", team: "FC ALNUKHAB", goals: 0, assists: 0, matches: 0 },
                // بني خالد 911 (2)
                { name: "جاسم", team: "بني خالد 911", goals: 0, assists: 0, matches: 0 },
                { name: "مازن", team: "بني خالد 911", goals: 0, assists: 0, matches: 0 },
                // العرب (6)
                { name: "ميسم الشباط", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "سمهر السباعي", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "عبد الرحمن تركماني", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "أدهم مشارقه", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "وجدي النجار", team: "العرب", goals: 0, assists: 0, matches: 0 },
                { name: "عبد الحفيظ زكور", team: "العرب", goals: 0, assists: 0, matches: 0 },
                // Al NASER (5)
                { name: "مهند قواس", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "جميل", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "عمر", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "فراس", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                { name: "همام", team: "Al NASER", goals: 0, assists: 0, matches: 0 },
                // CUKUR FFC (3)
                { name: "شعار", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                { name: "فهد", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                { name: "مالك", team: "CUKUR FFC", goals: 0, assists: 0, matches: 0 },
                // team fc (1)
                { name: "عزت", team: "team fc", goals: 0, assists: 0, matches: 0 }
                // Star club, Al Nukhba, Alpha squad = بدون لاعبين
            ]
        };

        // ===== دالة强制 إعادة تعيين البيانات =====
        function forceResetData() {
            localStorage.setItem('leagueData', JSON.stringify(DEFAULT_DATA));
            renderAll();
        }

        function loadData() {
            const saved = localStorage.getItem('leagueData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // التأكد من وجود جميع الفرق الجديدة
                    const teamNames = parsed.teams.map(t => t.name);
                    const newTeams = DEFAULT_DATA.teams.filter(t => !teamNames.includes(t.name));
                    if (newTeams.length > 0) {
                        parsed.teams = parsed.teams.concat(newTeams);
                    }
                    return parsed;
                } catch (e) {
                    return DEFAULT_DATA;
                }
            } else {
                saveData(DEFAULT_DATA);
                return DEFAULT_DATA;
            }
        }

        function saveData(data) {
            localStorage.setItem('leagueData', JSON.stringify(data));
        }

        function getData() {
            return loadData();
        }

        function renderAll() {
            const data = getData();
            renderTeams(data);
            renderGoals(data);
        }

        function renderTeams(data) {
            const tbody = document.getElementById('teamsBody');
            const sorted = [...data.teams].sort((a, b) => b.points - a.points);
            tbody.innerHTML = sorted.map((team, i) => `
                <tr onclick="showTeamPlayers('${team.name}')">
                    <td>${i + 1}</td>
                    <td class="team-name">${team.name}</td>
                    <td>${team.played}</td>
                    <td>${team.wins}</td>
                    <td>${team.losses}</td>
                    <td><span class="points-highlight">${team.points}</span></td>
                </tr>
            `).join('');
        }

        function renderGoals(data) {
            const tbody = document.getElementById('goalsBody');
            const sorted = [...data.players].sort((a, b) => b.goals - a.goals);
            tbody.innerHTML = sorted.map((p, i) => `
                <tr onclick="showPlayerStats('${p.name}')">
                    <td>${i + 1}</td>
                    <td class="team-name">${p.name}</td>
                    <td>${p.team}</td>
                    <td>${p.goals}</td>
                </tr>
            `).join('');
        }

        function showTeamPlayers(teamName) {
            const data = getData();
            const teamPlayers = data.players.filter(p => p.team === teamName);
            const modal = document.getElementById('playersModal');
            const modalTitle = document.getElementById('modalTeamName');
            const modalList = document.getElementById('modalPlayersList');

            modalTitle.textContent = `🏆 ${teamName}`;

            if (teamPlayers.length === 0) {
                modalList.innerHTML = `<div class="no-players">🚫 لا يوجد لاعبون في هذا الفريق</div>`;
            } else {
                modalList.innerHTML = teamPlayers.map(p => `
                    <div class="player-item" onclick="event.stopPropagation(); showPlayerStats('${p.name}')">
                        <span class="flag">${SYRIAN_FLAG}</span>
                        <span>${p.name}</span>
                        <span style="color:rgba(255,255,255,0.15);font-size:13px;margin-right:auto;">سوريا</span>
                    </div>
                `).join('');
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('playersModal').classList.remove('active');
        }

        function showPlayerStats(playerName) {
            const data = getData();
            const player = data.players.find(p => p.name === playerName);
            if (!player) return;

            document.getElementById('playerNameDisplay').textContent = player.name;
            document.getElementById('playerTeamDisplay').textContent = `🏟️ ${player.team}`;
            document.getElementById('playerGoals').textContent = player.goals || 0;
            document.getElementById('playerAssists').textContent = player.assists || 0;
            document.getElementById('playerMatches').textContent = player.matches || 0;
            document.getElementById('playerFlag').textContent = SYRIAN_FLAG;

            const avatar = document.getElementById('playerAvatar');
            const img = avatar.querySelector('img');
            const placeholder = avatar.querySelector('.placeholder');
            if (img) { img.style.display = 'none'; img.src = ''; }
            if (placeholder) { placeholder.style.display = 'block'; }

            document.getElementById('playerModal').classList.add('active');
        }

        function closePlayerModal() {
            document.getElementById('playerModal').classList.remove('active');
        }

        document.getElementById('playersModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('playerModal').addEventListener('click', function(e) {
            if (e.target === this) closePlayerModal();
        });

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }

        // ===== عند تحميل الصفحة: إعادة تعيين إجبارية =====
        document.addEventListener('DOMContentLoaded', function() {
            // إعادة تعيين إجبارية عشان تظهر الفرق الجديدة
            localStorage.setItem('leagueData', JSON.stringify(DEFAULT_DATA));
            renderAll();
            setupTabs();
        });
    </script>

</body>
</html>
